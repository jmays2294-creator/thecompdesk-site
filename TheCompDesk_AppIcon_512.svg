<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0e1629"/>
  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Desk surface line -->
  <rect x="56" y="340" width="400" height="6" rx="3" fill="#3b82f6" opacity="0.6"/>
  <!-- Calculator body -->
  <rect x="160" y="100" width="192" height="250" rx="16" fill="#1a2740" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Calculator screen -->
  <rect x="180" y="120" width="152" height="50" rx="8" fill="#0a1220" stroke="#2a4a6f" stroke-width="1"/>
  <!-- Screen text - dollar sign -->
  <text x="316" y="157" font-family="'SF Mono','Consolas',monospace" font-size="28" font-weight="700" fill="#2dd4a0" text-anchor="end">$524.83</text>
  <!-- Calculator buttons grid - 4x3 -->
  <rect x="180" y="186" width="32" height="24" rx="4" fill="#1e3a5f"/><rect x="220" y="186" width="32" height="24" rx="4" fill="#1e3a5f"/>
  <rect x="260" y="186" width="32" height="24" rx="4" fill="#1e3a5f"/><rect x="300" y="186" width="32" height="24" rx="4" fill="#3b82f6"/>
  <rect x="180" y="218" width="32" height="24" rx="4" fill="#1e3a5f"/><rect x="220" y="218" width="32" height="24" rx="4" fill="#1e3a5f"/>
  <rect x="260" y="218" width="32" height="24" rx="4" fill="#1e3a5f"/><rect x="300" y="218" width="32" height="24" rx="4" fill="#3b82f6"/>
  <rect x="180" y="250" width="32" height="24" rx="4" fill="#1e3a5f"/><rect x="220" y="250" width="32" height="24" rx="4" fill="#1e3a5f"/>
  <rect x="260" y="250" width="32" height="24" rx="4" fill="#1e3a5f"/><rect x="300" y="250" width="32" height="24" rx="4" fill="#f59e0b"/>
  <rect x="180" y="282" width="72" height="24" rx="4" fill="#1e3a5f"/><rect x="260" y="282" width="32" height="24" rx="4" fill="#1e3a5f"/>
  <rect x="300" y="282" width="32" height="24" rx="4" fill="#2dd4a0"/>
  <!-- Scale of justice (small, above-right of calculator) -->
  <line x1="380" y1="140" x2="380" y2="220" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="350" y1="155" x2="410" y2="155" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M345 155 L338 185 Q345 192 352 185 Z" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right pan -->
  <path d="M405 155 L398 185 Q405 192 412 185 Z" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Scale base -->
  <rect x="370" y="218" width="20" height="6" rx="3" fill="#f59e0b"/>
  <!-- Gavel (small, left of calculator) -->
  <line x1="105" y1="175" x2="140" y2="210" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <rect x="90" y="160" width="24" height="12" rx="3" fill="#f59e0b" transform="rotate(-45 102 166)"/>
  <!-- Text: THE COMP DESK -->
  <text x="256" y="395" font-family="'Helvetica Neue','Arial',sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3">THE COMP DESK</text>
  <text x="256" y="425" font-family="'Helvetica Neue','Arial',sans-serif" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="4">NYS WORKERS' COMPENSATION</text>
  <!-- Subtle accent line under text -->
  <rect x="176" y="440" width="160" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>
</svg>
