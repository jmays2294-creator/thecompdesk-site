<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delete My Story - The Comp Desk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  body{font-family:'DM Sans',system-ui,sans-serif;background:#06080f;color:#dce4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:520px;background:#0e1322;border:1px solid #1c2d4a;border-radius:14px;padding:30px;text-align:center}
  h1{color:#f4f6fa;margin-bottom:10px}
  button{background:#ef4444;color:#fff;border:none;padding:14px 22px;border-radius:10px;font-weight:600;cursor:pointer;font-size:16px;margin-top:18px;font-family:inherit}
  .msg{margin-top:18px}
  .ok{color:#2dd4a0}
  .err{color:#ef4444}
  a{color:#4f8ff7}
</style>
</head>
<body>
<div class="card">
  <h1>Delete your story</h1>
  <p>This will permanently delete the story you submitted, including any uploaded photo. This cannot be undone.</p>
  <button id="del">Permanently delete</button>
  <div id="msg" class="msg"></div>
  <p style="margin-top:24px;font-size:13px"><a href="/">Back to The Comp Desk</a></p>
</div>
<script>
const SUPABASE_URL = 'https://ltibymvlytodkemdeeox.supabase.co';
const params = new URLSearchParams(location.search);
const id = params.get('id'); const token = params.get('token');
const msg = document.getElementById('msg');
document.getElementById('del').addEventListener('click', async () => {
  if (!id || !token) { msg.innerHTML = '<span class="err">Missing id or token in link.</span>'; return; }
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/customer-story-delete?id=${encodeURIComponent(id)}&token=${encodeURIComponent(token)}`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    msg.innerHTML = '<span class="ok">Your story has been permanently deleted.</span>';
  } catch (e) { msg.innerHTML = `<span class="err">${e.message}</span>`; }
});
</script>
<script src="/js/disclaimer.js" defer></script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
