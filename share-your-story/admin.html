<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Customer Stories — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  body{font-family:'DM Sans',system-ui,sans-serif;background:#06080f;color:#dce4f0;margin:0;padding:24px}
  h1{color:#f4f6fa}
  .card{background:#0e1322;border:1px solid #1c2d4a;border-radius:12px;padding:18px;margin:14px 0}
  .row{display:flex;flex-wrap:wrap;gap:18px}
  .col{flex:1;min-width:240px}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
  .pending{background:rgba(240,160,48,.15);color:#f0a030}
  .approved{background:rgba(45,212,160,.15);color:#2dd4a0}
  .rejected{background:rgba(239,68,68,.15);color:#ef4444}
  .deleted{background:#1c2d4a;color:#8899b4}
  button{background:#4f8ff7;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer;margin-right:6px;font-family:inherit}
  button.warn{background:#ef4444}
  button.ok{background:#2dd4a0;color:#06080f}
  pre{white-space:pre-wrap;color:#dce4f0;background:#06080f;padding:10px;border-radius:8px;border:1px solid #1c2d4a}
  .meta{color:#8899b4;font-size:13px}
  .consent{font-size:13px;color:#dce4f0}
  input{background:#06080f;border:1px solid #1c2d4a;color:#dce4f0;padding:10px;border-radius:8px;font-family:inherit}
  #login{max-width:380px}
</style>
</head>
<body>
<h1>Customer Stories — Admin Review</h1>
<div id="login" class="card" style="display:none">
  <p>Sign in to review submissions.</p>
  <input id="email" type="email" placeholder="Email" /><br><br>
  <input id="pw" type="password" placeholder="Password" /><br><br>
  <button id="signin">Sign in</button>
  <div id="loginErr" style="color:#ef4444;margin-top:10px"></div>
</div>
<div id="app" style="display:none">
  <p class="meta">Signed in as <span id="who"></span> · <button id="signout" style="background:#1c2d4a">Sign out</button></p>
  <div id="list"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const SUPABASE_URL='https://ltibymvlytodkemdeeox.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0aWJ5bXZseXRvZGtlbWRlZW94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjA1NjYsImV4cCI6MjA5MDM5NjU2Nn0.b5oQqQIdgJRc0DEP2k7kMVdCRzfyfnuAwjVNZlbVyak';
const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const login=document.getElementById('login');
const app=document.getElementById('app');
const list=document.getElementById('list');

async function refresh(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){ login.style.display='block'; app.style.display='none'; return; }
  document.getElementById('who').textContent = session.user.email;
  login.style.display='none'; app.style.display='block';
  const res = await fetch(`${SUPABASE_URL}/functions/v1/customer-story-admin?action=list`,{
    headers:{'Authorization':`Bearer ${session.access_token}`,'apikey':SUPABASE_ANON_KEY}
  });
  const data = await res.json();
  if(!res.ok){ list.innerHTML=`<div class="card">${data.error||'error'}</div>`; return; }
  list.innerHTML = (data.stories||[]).map(render).join('') || '<p class="meta">No submissions yet.</p>';
  for(const el of list.querySelectorAll('[data-act]')){
    el.addEventListener('click', () => action(el.dataset.id, el.dataset.act));
  }
}

function esc(s){ return (s||'').toString().replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function render(s){
  return `<div class="card">
    <div class="row">
      <div class="col">
        <div><span class="badge ${s.status}">${s.status}</span> <span class="meta">${new Date(s.created_at).toLocaleString()}</span></div>
        <h3 style="color:#f4f6fa;margin:8px 0">${esc(s.name||'(no name)')} — ${esc(s.state||'')}</h3>
        <div class="meta">Injury: ${esc(s.injury_type||'')}</div>
        <div class="consent" style="margin-top:8px">
          <strong>Consent:</strong> display=${s.consent_display}; photo=${s.consent_photo?'YES':'no'}; quotes=${s.consent_quotes?'YES':'no'}
        </div>
        ${s.contact_email?`<div class="meta">Contact: ${esc(s.contact_email)}</div>`:''}
        ${s.photo_path?`<div class="meta">Photo: ${esc(s.photo_path)}</div>`:''}
      </div>
      <div class="col">
        <strong>What helped:</strong><pre>${esc(s.what_helped||'')}</pre>
        <strong>What didn't:</strong><pre>${esc(s.what_didnt||'')}</pre>
      </div>
    </div>
    <div style="margin-top:12px">
      <button class="ok" data-act="approved" data-id="${s.id}">Approve</button>
      <button data-act="rejected" data-id="${s.id}">Reject</button>
      <button class="warn" data-act="hard_delete" data-id="${s.id}">Hard delete</button>
    </div>
  </div>`;
}

async function action(id, status){
  if(status==='hard_delete' && !confirm('Permanently delete this submission?')) return;
  const { data:{ session } } = await supabase.auth.getSession();
  const res = await fetch(`${SUPABASE_URL}/functions/v1/customer-story-admin`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`,'apikey':SUPABASE_ANON_KEY},
    body: JSON.stringify({ id, status })
  });
  if(!res.ok){ alert((await res.json()).error||'failed'); return; }
  refresh();
}

document.getElementById('signin').addEventListener('click', async () => {
  const email=document.getElementById('email').value;
  const password=document.getElementById('pw').value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if(error){ document.getElementById('loginErr').textContent=error.message; return; }
  refresh();
});
document.getElementById('signout').addEventListener('click', async ()=>{ await supabase.auth.signOut(); refresh(); });

refresh();
</script>
</body>
</html>
