<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - The Comp Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06080f;
            --card: #0e1322;
            --cardA: #151d30;
            --bd: #1c2d4a;
            --ac: #4f8ff7;
            --acG: rgba(79,143,247,0.12);
            --gd: #f0a030;
            --gn: #2dd4a0;
            --tx: #dce4f0;
            --txD: #8899b4;
            --txM: #5a6a82;
            --wh: #f4f6fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--tx);
            line-height: 1.6;
        }

        /* Navigation Bar */
        nav {
            background-color: var(--card);
            border-bottom: 1px solid var(--bd);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--wh);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--tx);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--ac);
        }

        /* Main Container */
        .container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
        }

        .account-header {
            margin-bottom: 3rem;
        }

        .account-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--wh);
        }

        .account-header p {
            color: var(--txD);
            font-size: 1rem;
        }

        .section {
            background-color: var(--card);
            border: 1px solid var(--bd);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--wh);
        }

        .info-group {
            margin-bottom: 1.5rem;
        }

        .info-label {
            font-size: 0.9rem;
            color: var(--txD);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .info-value {
            font-size: 1.1rem;
            color: var(--tx);
            font-weight: 500;
        }

        .info-value.loading {
            color: var(--txM);
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', system-ui, sans-serif;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .button-primary {
            background: linear-gradient(135deg, var(--ac), rgba(79,143,247,0.8));
            color: var(--wh);
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(79,143,247,0.3);
        }

        .button-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .button-secondary {
            background-color: var(--cardA);
            color: var(--tx);
            border: 1px solid var(--bd);
        }

        .button-secondary:hover {
            border-color: var(--ac);
            color: var(--ac);
        }

        .button-danger {
            background-color: rgba(239,68,68,0.1);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3);
        }

        .button-danger:hover {
            background-color: rgba(239,68,68,0.2);
            border-color: #ef4444;
        }

        .message {
            padding: 1rem;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .message.success {
            background-color: rgba(45,212,160,0.15);
            border: 1px solid var(--gn);
            color: var(--gn);
        }

        .message.error {
            background-color: rgba(239,68,68,0.15);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }

        .message.info {
            background-color: var(--acG);
            border: 1px solid var(--ac);
            color: var(--ac);
        }

        .hidden {
            display: none;
        }

        .tier-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .tier-badge.free {
            background-color: var(--acG);
            color: var(--ac);
        }

        .tier-badge.pro {
            background-color: rgba(240,160,48,0.15);
            color: var(--gd);
        }

        .tier-badge.firm {
            background-color: rgba(45,212,160,0.15);
            color: var(--gn);
        }

        .tier-badge.active {
            background-color: rgba(34,197,94,0.15);
            color: #86efac;
            border: 1px solid #86efac;
        }

        .subscription-details {
            background-color: var(--cardA);
            padding: 1.5rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            color: var(--txD);
        }

        .detail-value {
            color: var(--tx);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a href="/" class="nav-brand">The Comp Desk</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/#features">Features</a></li>
            <li><a href="/#pricing">Pricing</a></li>
        </ul>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <div class="account-header">
            <h1>My Account</h1>
            <p>Manage your subscription and account settings</p>
        </div>

        <!-- Messages -->
        <div id="message" class="message hidden"></div>

        <!-- Account Information Section -->
        <div class="section">
            <h2 class="section-title">Account Information</h2>

            <div class="info-group">
                <div class="info-label">Email</div>
                <div class="info-value" id="userEmail">Loading...</div>
            </div>
        </div>

        <!-- Subscription Section -->
        <div class="section">
            <h2 class="section-title">Subscription</h2>

            <div id="subscriptionLoading" class="info-value loading">Loading subscription details...</div>

            <div id="subscriptionContent" class="hidden">
                <div class="subscription-details">
                    <div class="detail-row">
                        <span class="detail-label">Current Tier</span>
                        <span class="detail-value" id="currentTier">—</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Status</span>
                        <span class="detail-value" id="subscriptionStatus">—</span>
                    </div>
                    <div class="detail-row" id="periodEndRow" class="hidden">
                        <span class="detail-label">Period Ends</span>
                        <span class="detail-value" id="periodEnd">—</span>
                    </div>
                </div>

                <div class="button-group" id="subscriptionButtons">
                    <!-- Buttons populated by JS -->
                </div>
            </div>
        </div>

        <!-- Account Actions Section -->
        <div class="section">
            <h2 class="section-title">Account Actions</h2>

            <div class="button-group">
                <button class="button button-danger" id="signOutButton">Sign Out</button>
            </div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ltibymvlytodkemdeeox.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ge2qY18DqmRyBN3VU7kl2g_kMbzk-x-';
        const STRIPE_PUBLISHABLE_KEY = 'pk_live_51TG3E59PGuR7kQ67JKKxZvxAwOKFyB2UwkJK95wCOGDqcJBBa26TGqzhAovpkdkIFUEhoxGVUdGKx0kZzV2KTwZP00e7f4xr44';
        const EDGE_FUNCTION_URL = 'https://ltibymvlytodkemdeeox.supabase.co/functions/v1/create-checkout';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let userProfile = null;

        // Check auth and load data
        async function initializePage() {
            try {
                const { data: { session } } = await supabase.auth.getSession();

                if (!session) {
                    window.location.href = '/auth.html';
                    return;
                }

                currentUser = session.user;
                document.getElementById('userEmail').textContent = currentUser.email;

                // Load user profile
                await loadUserProfile();
                await renderSubscriptionInfo();
            } catch (error) {
                console.error('Error initializing page:', error);
                showMessage('Failed to load account information.', 'error');
            }
        }

        // Load user profile from Supabase
        async function loadUserProfile() {
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();

                if (error && error.code !== 'PGRST116') {
                    throw error;
                }

                userProfile = data || {
                    id: currentUser.id,
                    tier: 'free',
                    subscription_status: 'none'
                };
            } catch (error) {
                console.error('Error loading profile:', error);
                userProfile = {
                    id: currentUser.id,
                    tier: 'free',
                    subscription_status: 'none'
                };
            }
        }

        // Render subscription information
        function renderSubscriptionInfo() {
            const tier = userProfile.tier || 'free';
            const status = userProfile.subscription_status || 'none';
            const periodEnd = userProfile.period_end;

            document.getElementById('subscriptionLoading').classList.add('hidden');
            document.getElementById('subscriptionContent').classList.remove('hidden');

            // Set tier display
            const tierDisplay = tier.charAt(0).toUpperCase() + tier.slice(1);
            document.getElementById('currentTier').innerHTML = `${tierDisplay} <span class="tier-badge ${tier}${status === 'active' ? ' active' : ''}">${status === 'active' ? 'Active' : 'Inactive'}</span>`;

            // Set status
            const statusText = status === 'active' ? 'Active' : status === 'trialing' ? 'Trialing' : 'Inactive';
            document.getElementById('subscriptionStatus').textContent = statusText;

            // Set period end if applicable
            if (periodEnd && status === 'active') {
                const periodEndDate = new Date(periodEnd).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                document.getElementById('periodEnd').textContent = periodEndDate;
                document.getElementById('periodEndRow').classList.remove('hidden');
            }

            // Render buttons
            const buttonsContainer = document.getElementById('subscriptionButtons');
            buttonsContainer.innerHTML = '';

            if (tier === 'free') {
                const proBtn = document.createElement('button');
                proBtn.className = 'button button-primary';
                proBtn.textContent = 'Upgrade to Pro';
                proBtn.onclick = () => handleUpgrade('pro');

                const firmBtn = document.createElement('button');
                firmBtn.className = 'button button-primary';
                firmBtn.textContent = 'Upgrade to Firm';
                firmBtn.onclick = () => handleUpgrade('firm');

                buttonsContainer.appendChild(proBtn);
                buttonsContainer.appendChild(firmBtn);
            } else if (status === 'active') {
                const manageBtn = document.createElement('a');
                manageBtn.href = 'https://billing.stripe.com/p/login/6oU00d6V598jgXz0yagIo00';
                manageBtn.target = '_blank';
                manageBtn.className = 'button button-secondary';
                manageBtn.textContent = 'Manage Subscription';

                buttonsContainer.appendChild(manageBtn);
            }
        }

        // Handle upgrade
        async function handleUpgrade(tier) {
            try {
                const button = event.target;
                button.disabled = true;
                button.textContent = 'Processing...';

                // Call Supabase Edge Function
                const { data, error } = await supabase.functions.invoke('create-checkout', {
                    body: {
                        tier: tier,
                        user_id: currentUser.id
                    }
                });

                if (error) {
                    throw error;
                }

                if (data && data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else {
                    showMessage('Unable to process upgrade. Please try again.', 'error');
                    button.disabled = false;
                    button.textContent = tier === 'pro' ? 'Upgrade to Pro' : 'Upgrade to Firm';
                }
            } catch (error) {
                console.error('Error processing upgrade:', error);
                showMessage('An error occurred during upgrade. Please try again.', 'error');
                const button = event.target;
                button.disabled = false;
                button.textContent = button.textContent.replace('Processing...', '');
            }
        }

        // Handle sign out
        async function handleSignOut() {
            try {
                const button = document.getElementById('signOutButton');
                button.disabled = true;
                button.textContent = 'Signing out...';

                const { error } = await supabase.auth.signOut();

                if (error) {
                    throw error;
                }

                showMessage('Signed out successfully. Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (error) {
                console.error('Error signing out:', error);
                showMessage('Failed to sign out. Please try again.', 'error');
                const button = document.getElementById('signOutButton');
                button.disabled = false;
                button.textContent = 'Sign Out';
            }
        }

        // Show message
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        // Event listeners
        document.getElementById('signOutButton').addEventListener('click', handleSignOut);

        // Initialize page
        initializePage();
    </script>
</body>
</html>
