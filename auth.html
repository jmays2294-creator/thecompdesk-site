<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - The Comp Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06080f;
            --card: #0e1322;
            --cardA: #151d30;
            --bd: #1c2d4a;
            --ac: #4f8ff7;
            --acG: rgba(79,143,247,0.12);
            --gd: #f0a030;
            --gn: #2dd4a0;
            --tx: #dce4f0;
            --txD: #8899b4;
            --txM: #5a6a82;
            --wh: #f4f6fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--tx);
            line-height: 1.6;
        }

        /* Navigation Bar */
        nav {
            background-color: var(--card);
            border-bottom: 1px solid var(--bd);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--wh);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--tx);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--ac);
        }

        /* Main Container */
        .container {
            max-width: 450px;
            margin: 4rem auto;
            padding: 2rem;
        }

        .auth-card {
            background-color: var(--card);
            border: 1px solid var(--bd);
            border-radius: 8px;
            padding: 2rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--wh);
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--bd);
        }

        .tab-button {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            color: var(--txD);
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            margin-bottom: -1px;
        }

        .tab-button.active {
            color: var(--ac);
            border-bottom-color: var(--ac);
        }

        .tab-button:hover {
            color: var(--tx);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--tx);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--cardA);
            border: 1px solid var(--bd);
            border-radius: 6px;
            color: var(--tx);
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--ac);
            background-color: rgba(79,143,247,0.05);
        }

        .form-group input::placeholder {
            color: var(--txM);
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 1.5rem;
        }

        .forgot-password a {
            color: var(--ac);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .forgot-password a:hover {
            color: var(--gd);
        }

        .submit-button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--ac), rgba(79,143,247,0.8));
            color: var(--wh);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', system-ui, sans-serif;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(79,143,247,0.3);
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .message.success {
            background-color: rgba(45,212,160,0.15);
            border: 1px solid var(--gn);
            color: var(--gn);
        }

        .message.error {
            background-color: rgba(239,68,68,0.15);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }

        .message.info {
            background-color: var(--acG);
            border: 1px solid var(--ac);
            color: var(--ac);
        }

        .hidden {
            display: none;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a href="/" class="nav-brand">The Comp Desk</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/#features">Features</a></li>
            <li><a href="/#pricing">Pricing</a></li>
        </ul>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 id="headerText">Log In</h1>
            </div>

            <!-- Messages -->
            <div id="message" class="message hidden"></div>

            <!-- Tab Buttons -->
            <div class="auth-tabs">
                <button class="tab-button active" id="loginTab" onclick="switchTab('login')">Log In</button>
                <button class="tab-button" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div class="form-section active" id="loginForm">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <div class="forgot-password">
                        <a href="#" id="forgotPasswordLink" onclick="handleForgotPassword(event)">Forgot password?</a>
                    </div>
                    <button type="submit" class="submit-button" id="loginButton">Log In</button>
                </form>
            </div>

            <!-- Sign Up Form -->
            <div class="form-section" id="signupForm">
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-button" id="signupButton">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ltibymvlytodkemdeeox.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ge2qY18DqmRyBN3VU7kl2g_kMbzk-x-';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Check if already logged in
        async function checkAuth() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.href = '/';
            }
        }

        checkAuth();

        // Tab switching
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const headerText = document.getElementById('headerText');
            const messageEl = document.getElementById('message');

            // Clear messages when switching tabs
            messageEl.classList.add('hidden');
            messageEl.textContent = '';

            if (tab === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                headerText.textContent = 'Log In';
            } else {
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                headerText.textContent = 'Create Account';
            }
        }

        // Show message
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const button = document.getElementById('loginButton');

            button.disabled = true;
            button.textContent = 'Logging in...';

            try {
                const { data, error } = await sb.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    showMessage(error.message, 'error');
                    button.disabled = false;
                    button.textContent = 'Log In';
                    return;
                }

                showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/account.html';
                }, 1000);
            } catch (err) {
                showMessage('An error occurred. Please try again.', 'error');
                button.disabled = false;
                button.textContent = 'Log In';
            }
        }

        // Handle Signup
        async function handleSignup(event) {
            event.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const button = document.getElementById('signupButton');

            if (password !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            button.disabled = true;
            button.textContent = 'Creating account...';

            try {
                const { data, error } = await sb.auth.signUp({
                    email,
                    password
                });

                if (error) {
                    showMessage(error.message, 'error');
                    button.disabled = false;
                    button.textContent = 'Create Account';
                    return;
                }

                showMessage('Account created! Check your email to verify your account.', 'success');
                document.getElementById('signupForm').style.display = 'none';
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            } catch (err) {
                showMessage('An error occurred. Please try again.', 'error');
                button.disabled = false;
                button.textContent = 'Create Account';
            }
        }

        // Handle Forgot Password
        async function handleForgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;

            if (!email) {
                showMessage('Please enter your email address.', 'error');
                return;
            }

            try {
                const { error } = await sb.auth.resetPasswordForEmail(email);

                if (error) {
                    showMessage(error.message, 'error');
                    return;
                }

                showMessage('Password reset email sent! Check your inbox.', 'success');
            } catch (err) {
                showMessage('An error occurred. Please try again.', 'error');
            }
        }
    </script>
</body>
</html>
